<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeador Semanal</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Organiza a tua vida por áreas e alcança o equilíbrio">
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Planeador">
    <link rel="manifest" href="manifest.json">
    
    <!-- Ícones -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151935;
            --bg-card: #1a1f3a;
            --accent-primary: #ff6b9d;
            --accent-secondary: #c06aff;
            --accent-tertiary: #4facfe;
            --text-primary: #ffffff;
            --text-secondary: #b8c5d6;
            --text-muted: #7a8599;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1535 50%, #0f1428 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
        }

        .background-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-primary);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--accent-secondary);
            bottom: -150px;
            left: -150px;
            animation-delay: 7s;
        }

        .orb-3 {
            width: 350px;
            height: 350px;
            background: var(--accent-tertiary);
            top: 50%;
            left: 50%;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -80px) scale(1.1); }
            66% { transform: translate(-50px, 80px) scale(0.9); }
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            align-items: stretch;
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 1;
            padding: 0 0.5rem;
        }

        .controls-top {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
        }

        .controls-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            width: 100%;
        }

        .week-input {
            background: var(--bg-card);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 0.7rem 1rem;
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            width: 100%;
            text-align: center;
        }

        .week-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.3);
        }

        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.7rem 1rem;
            border-radius: 10px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.12);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--bg-secondary);
            padding: 0.5rem;
            border-radius: 16px;
            position: relative;
            z-index: 1;
            overflow-x: auto;
        }

        .tab {
            flex: 1;
            min-width: 120px;
            padding: 1rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab.active {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(192, 106, 255, 0.2));
            color: var(--text-primary);
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.2);
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        .areas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            position: relative;
            z-index: 1;
        }

        .area-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            cursor: grab;
        }

        .area-card:active {
            cursor: grabbing;
        }

        .area-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .area-card.drag-over {
            border-color: var(--accent-primary);
            transform: translateY(-8px);
        }

        .area-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--area-color);
            opacity: 0.8;
        }

        .area-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: var(--area-color);
        }

        .area-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .area-icon {
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .area-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .time-slots {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .time-slot {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .time-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 90px;
            font-weight: 500;
        }

        .activity-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .activity-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--area-color);
            box-shadow: 0 0 10px rgba(var(--area-color-rgb), 0.2);
        }

        .activity-input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .notes-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .notes-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .notes-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 80px;
            transition: all 0.3s ease;
        }

        .notes-textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.2);
        }

        .overview-grid {
            display: grid;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .overview-row {
            display: grid;
            grid-template-columns: 150px repeat(8, 1fr);
            gap: 0.5rem;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .overview-row:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(4px);
        }

        .overview-day {
            font-weight: 700;
            display: flex;
            align-items: center;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .overview-cell {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            text-align: left;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            overflow-y: auto;
        }

        .overview-cell:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--area-color);
        }

        .overview-cell-header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.3rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 700;
            color: var(--text-primary);
        }

        .overview-cell-icon {
            font-size: 1rem;
        }

        .overview-cell-name {
            font-size: 0.75rem;
        }

        .overview-activity {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            line-height: 1.3;
            border-left: 2px solid var(--area-color);
        }

        .overview-time {
            color: var(--text-muted);
            font-weight: 600;
            margin-right: 0.3rem;
        }

        .agenda-container {
            position: relative;
            z-index: 1;
        }

        .agenda-timeline {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .agenda-slot {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 2rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .agenda-slot:last-child {
            border-bottom: none;
        }

        .agenda-slot:hover {
            background: rgba(255, 255, 255, 0.03);
            margin: 0 -1rem;
            padding: 1.5rem 1rem;
            border-radius: 8px;
        }

        .agenda-time {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: right;
        }

        .agenda-activities {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .agenda-activity {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 1.2rem;
            border-radius: 10px;
            border-left: 4px solid var(--activity-color);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .agenda-activity:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(8px);
        }

        .agenda-activity-icon {
            font-size: 1.5rem;
        }

        .agenda-activity-content {
            flex: 1;
        }

        .agenda-activity-category {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--activity-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.3rem;
        }

        .agenda-activity-text {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .agenda-empty-slot {
            color: var(--text-muted);
            font-style: italic;
            opacity: 0.5;
            padding: 0.5rem 0;
        }

        .view-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.4rem;
            background: var(--bg-secondary);
            padding: 0.4rem;
            border-radius: 12px;
            width: 100%;
        }

        .view-tab {
            padding: 0.6rem 0.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.75rem;
            white-space: nowrap;
            text-align: center;
        }

        .view-tab.active {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.2), rgba(192, 106, 255, 0.2));
            color: var(--text-primary);
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.2);
        }

        .view-tab:active {
            transform: scale(0.98);
        }

        .export-notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(16, 185, 129, 0.4);
            animation: slideIn 0.5s ease;
            z-index: 1000;
        }

        .sync-indicator {
            position: fixed;
            top: 0.8rem;
            right: 0.8rem;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .sync-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 0.85rem;
            }

            .app-container {
                padding: 1rem 0.5rem;
            }

            .overview-row {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }

            .tabs::-webkit-scrollbar {
                display: none;
            }

            .tab {
                min-width: 80px;
                padding: 0.7rem 0.8rem;
                font-size: 0.85rem;
            }

            .areas-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .area-card {
                padding: 1rem;
            }

            .area-title {
                font-size: 1.1rem;
            }

            .time-label {
                min-width: 60px;
                font-size: 0.75rem;
            }

            .activity-input {
                font-size: 0.85rem;
                padding: 0.5rem;
            }

            .sync-indicator {
                font-size: 0.65rem;
                padding: 0.3rem 0.6rem;
                top: 0.5rem;
                right: 0.5rem;
            }

            .view-tab {
                font-size: 0.7rem;
                padding: 0.5rem 0.3rem;
            }

            .controls-bottom {
                grid-template-columns: 1fr 1fr;
                gap: 0.4rem;
            }

            .btn {
                font-size: 0.75rem;
                padding: 0.6rem 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .view-tab {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const initialAreas = [
            { id: 'exercise', name: 'Atividade Física', icon: '💪', color: '#10b981', colorRgb: '16, 185, 129' },
            { id: 'training', name: 'Formação', icon: '📚', color: '#3b82f6', colorRgb: '59, 130, 246' },
            { id: 'work', name: 'Profissional', icon: '💼', color: '#f59e0b', colorRgb: '245, 158, 11' },
            { id: 'personal', name: 'Pessoal', icon: '✨', color: '#ec4899', colorRgb: '236, 72, 153' },
            { id: 'mother', name: 'M\'s', icon: '❤️', color: '#ef4444', colorRgb: '239, 68, 68' },
            { id: 'home', name: 'Casa', icon: '🏠', color: '#84cc16', colorRgb: '132, 204, 22' },
            { id: 'others', name: 'Outros', icon: '📌', color: '#9333ea', colorRgb: '147, 51, 234' }
        ];

        const days = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
        const timeSlots = [
            '06:00', '07:00', '08:00', '09:00', '10:00', '11:00', 
            '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', 
            '18:00', '19:00', '20:00', '21:00', '22:00'
        ];

        function App() {
            const [currentDay, setCurrentDay] = useState(0);
            const [weekDate, setWeekDate] = useState('');
            const [areas, setAreas] = useState(initialAreas);
            
            // Carregar dados salvos do localStorage ao iniciar
            const [activities, setActivities] = useState(() => {
                const saved = localStorage.getItem('weeklyPlannerData');
                if (saved) {
                    try {
                        return JSON.parse(saved);
                    } catch (e) {
                        console.error('Erro ao carregar dados:', e);
                    }
                }
                
                const initial = {};
                days.forEach((_, dayIdx) => {
                    initial[dayIdx] = {};
                    initialAreas.forEach(area => {
                        initial[dayIdx][area.id] = {
                            slots: {},
                            notes: ''
                        };
                        timeSlots.forEach(slot => {
                            initial[dayIdx][area.id].slots[slot] = '';
                        });
                    });
                });
                return initial;
            });
            
            const [view, setView] = useState('daily');
            const [showNotification, setShowNotification] = useState(false);
            const [draggedArea, setDraggedArea] = useState(null);

            // Carregar data da semana do localStorage
            React.useEffect(() => {
                const savedDate = localStorage.getItem('weeklyPlannerDate');
                if (savedDate) {
                    setWeekDate(savedDate);
                }
            }, []);

            // Guardar dados automaticamente sempre que houver alterações
            React.useEffect(() => {
                localStorage.setItem('weeklyPlannerData', JSON.stringify(activities));
            }, [activities]);

            // Guardar data da semana
            React.useEffect(() => {
                localStorage.setItem('weeklyPlannerDate', weekDate);
            }, [weekDate]);

            // Guardar ordem das áreas
            React.useEffect(() => {
                localStorage.setItem('weeklyPlannerAreas', JSON.stringify(areas));
            }, [areas]);

            // Carregar ordem das áreas
            React.useEffect(() => {
                const savedAreas = localStorage.getItem('weeklyPlannerAreas');
                if (savedAreas) {
                    try {
                        setAreas(JSON.parse(savedAreas));
                    } catch (e) {
                        console.error('Erro ao carregar áreas:', e);
                    }
                }
            }, []);

            const getDayAgenda = (dayIdx) => {
                const agenda = {};
                timeSlots.forEach(slot => {
                    agenda[slot] = [];
                });

                areas.forEach(area => {
                    const areaData = activities[dayIdx][area.id];
                    Object.entries(areaData.slots).forEach(([time, activity]) => {
                        if (activity.trim() !== '') {
                            agenda[time].push({
                                category: area.name,
                                icon: area.icon,
                                color: area.color,
                                activity: activity
                            });
                        }
                    });
                });

                return agenda;
            };

            const updateActivity = (dayIdx, areaId, slot, value) => {
                setActivities(prev => ({
                    ...prev,
                    [dayIdx]: {
                        ...prev[dayIdx],
                        [areaId]: {
                            ...prev[dayIdx][areaId],
                            slots: {
                                ...prev[dayIdx][areaId].slots,
                                [slot]: value
                            }
                        }
                    }
                }));
            };

            const updateNotes = (dayIdx, areaId, value) => {
                setActivities(prev => ({
                    ...prev,
                    [dayIdx]: {
                        ...prev[dayIdx],
                        [areaId]: {
                            ...prev[dayIdx][areaId],
                            notes: value
                        }
                    }
                }));
            };

            const handleDragStart = (e, index) => {
                setDraggedArea(index);
                e.currentTarget.classList.add('dragging');
            };

            const handleDragEnd = (e) => {
                e.currentTarget.classList.remove('dragging');
                setDraggedArea(null);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDragEnter = (e, index) => {
                e.preventDefault();
                if (draggedArea !== null && draggedArea !== index) {
                    e.currentTarget.classList.add('drag-over');
                }
            };

            const handleDragLeave = (e) => {
                e.currentTarget.classList.remove('drag-over');
            };

            const handleDrop = (e, dropIndex) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                
                if (draggedArea !== null && draggedArea !== dropIndex) {
                    const newAreas = [...areas];
                    const draggedItem = newAreas[draggedArea];
                    newAreas.splice(draggedArea, 1);
                    newAreas.splice(dropIndex, 0, draggedItem);
                    setAreas(newAreas);
                }
            };

            const exportToWord = async () => {
                const data = {
                    weekDate,
                    days: days.map((day, idx) => ({
                        name: day,
                        areas: areas.map(area => ({
                            name: area.name,
                            icon: area.icon,
                            activities: activities[idx][area.id].slots,
                            notes: activities[idx][area.id].notes
                        }))
                    }))
                };

                console.log('Dados para exportar:', data);
                
                setShowNotification(true);
                setTimeout(() => setShowNotification(false), 3000);
            };

            const clearAll = () => {
                if (confirm('Tens a certeza que queres limpar todos os dados?')) {
                    setActivities(() => {
                        const initial = {};
                        days.forEach((_, dayIdx) => {
                            initial[dayIdx] = {};
                            areas.forEach(area => {
                                initial[dayIdx][area.id] = {
                                    slots: {},
                                    notes: ''
                                };
                                timeSlots.forEach(slot => {
                                    initial[dayIdx][area.id].slots[slot] = '';
                                });
                            });
                        });
                        return initial;
                    });
                    setWeekDate('');
                }
            };

            const backupData = () => {
                const data = {
                    version: '1.0',
                    date: new Date().toISOString(),
                    weekDate: weekDate,
                    areas: areas,
                    activities: activities
                };
                
                const dataStr = JSON.stringify(data, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `planeador-backup-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                setShowNotification(true);
                setTimeout(() => setShowNotification(false), 3000);
            };

            const restoreData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        if (data.version && data.activities) {
                            if (confirm('Tens a certeza que queres restaurar este backup? Os dados atuais serão substituídos.')) {
                                setWeekDate(data.weekDate || '');
                                if (data.areas) setAreas(data.areas);
                                setActivities(data.activities);
                                
                                alert('✅ Backup restaurado com sucesso!');
                            }
                        } else {
                            alert('❌ Ficheiro de backup inválido!');
                        }
                    } catch (error) {
                        alert('❌ Erro ao ler o ficheiro de backup!');
                        console.error('Erro:', error);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const triggerFileInput = () => {
                document.getElementById('restore-input').click();
            };

            const getAreaActivities = (dayIdx, areaId) => {
                const areaData = activities[dayIdx][areaId];
                const filledSlots = Object.entries(areaData.slots)
                    .filter(([_, value]) => value.trim() !== '')
                    .map(([time, activity]) => ({ time, activity }));
                return filledSlots;
            };

            return (
                <div className="app-container">
                    <div className="background-orbs">
                        <div className="orb orb-1"></div>
                        <div className="orb orb-2"></div>
                        <div className="orb orb-3"></div>
                    </div>

                    <div className="sync-indicator">
                        <div className="sync-dot"></div>
                        Guardado automaticamente
                    </div>

                    <div className="header">
                        <h1>Planeador Semanal</h1>
                        <p>Organiza a tua vida por áreas e alcança o equilíbrio</p>
                    </div>

                    <div className="controls">
                        <div className="controls-top">
                            <input
                                type="text"
                                className="week-input"
                                placeholder="Semana de: dd/mm/aaaa"
                                value={weekDate}
                                onChange={(e) => setWeekDate(e.target.value)}
                            />
                            <div className="view-tabs">
                                <button 
                                    className={`view-tab ${view === 'daily' ? 'active' : ''}`}
                                    onClick={() => setView('daily')}
                                >
                                    📋 Por Categoria
                                </button>
                                <button 
                                    className={`view-tab ${view === 'agenda' ? 'active' : ''}`}
                                    onClick={() => setView('agenda')}
                                >
                                    📅 Agenda do Dia
                                </button>
                                <button 
                                    className={`view-tab ${view === 'overview' ? 'active' : ''}`}
                                    onClick={() => setView('overview')}
                                >
                                    📊 Vista Geral
                                </button>
                            </div>
                        </div>
                        <div className="controls-bottom">
                            <button className="btn" onClick={backupData}>
                                💾 Fazer Backup
                            </button>
                            <button className="btn" onClick={triggerFileInput}>
                                📥 Restaurar Backup
                            </button>
                            <button className="btn" onClick={exportToWord}>
                                📄 Exportar Word
                            </button>
                            <button className="btn" onClick={clearAll}>
                                🗑️ Limpar Tudo
                            </button>
                        </div>
                        <input 
                            type="file" 
                            id="restore-input" 
                            accept=".json"
                            onChange={restoreData}
                            style={{ display: 'none' }}
                        />
                    </div>

                    {view === 'daily' ? (
                        <>
                            <div className="tabs">
                                {days.map((day, idx) => (
                                    <button
                                        key={idx}
                                        className={`tab ${currentDay === idx ? 'active' : ''}`}
                                        onClick={() => setCurrentDay(idx)}
                                    >
                                        {day}
                                    </button>
                                ))}
                            </div>

                            <div className="areas-grid">
                                {areas.map((area, index) => (
                                    <div
                                        key={area.id}
                                        className="area-card"
                                        draggable="true"
                                        onDragStart={(e) => handleDragStart(e, index)}
                                        onDragEnd={handleDragEnd}
                                        onDragOver={handleDragOver}
                                        onDragEnter={(e) => handleDragEnter(e, index)}
                                        onDragLeave={handleDragLeave}
                                        onDrop={(e) => handleDrop(e, index)}
                                        style={{
                                            '--area-color': area.color,
                                            '--area-color-rgb': area.colorRgb
                                        }}
                                    >
                                        <div className="area-header">
                                            <span className="area-icon">{area.icon}</span>
                                            <h3 className="area-title">{area.name}</h3>
                                        </div>
                                        <div className="time-slots">
                                            {timeSlots.map(slot => (
                                                <div key={slot} className="time-slot">
                                                    <span className="time-label">{slot}</span>
                                                    <input
                                                        type="text"
                                                        className="activity-input"
                                                        placeholder="O que vais fazer?"
                                                        value={activities[currentDay][area.id].slots[slot]}
                                                        onChange={(e) => updateActivity(currentDay, area.id, slot, e.target.value)}
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                        <div className="notes-section">
                                            <div className="notes-label">
                                                <span>📝</span>
                                                <span>Notas</span>
                                            </div>
                                            <textarea
                                                className="notes-textarea"
                                                placeholder="Observações, objetivos, reflexões..."
                                                value={activities[currentDay][area.id].notes}
                                                onChange={(e) => updateNotes(currentDay, area.id, e.target.value)}
                                            />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    ) : view === 'agenda' ? (
                        <>
                            <div className="tabs">
                                {days.map((day, idx) => (
                                    <button
                                        key={idx}
                                        className={`tab ${currentDay === idx ? 'active' : ''}`}
                                        onClick={() => setCurrentDay(idx)}
                                    >
                                        {day}
                                    </button>
                                ))}
                            </div>

                            <div className="agenda-container">
                                <div className="agenda-timeline">
                                    {timeSlots.map(slot => {
                                        const agenda = getDayAgenda(currentDay);
                                        const slotActivities = agenda[slot];
                                        
                                        return (
                                            <div key={slot} className="agenda-slot">
                                                <div className="agenda-time">{slot}</div>
                                                <div className="agenda-activities">
                                                    {slotActivities.length > 0 ? (
                                                        slotActivities.map((item, idx) => (
                                                            <div 
                                                                key={idx} 
                                                                className="agenda-activity"
                                                                style={{ '--activity-color': item.color }}
                                                            >
                                                                <span className="agenda-activity-icon">{item.icon}</span>
                                                                <div className="agenda-activity-content">
                                                                    <div className="agenda-activity-category">{item.category}</div>
                                                                    <div className="agenda-activity-text">{item.activity}</div>
                                                                </div>
                                                            </div>
                                                        ))
                                                    ) : (
                                                        <div className="agenda-empty-slot">Sem atividades</div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </>
                    ) : (
                        <div className="overview-grid">
                            {days.map((day, dayIdx) => (
                                <div key={dayIdx} className="overview-row">
                                    <div className="overview-day">{day}</div>
                                    {areas.map(area => {
                                        const areaActivities = getAreaActivities(dayIdx, area.id);
                                        return (
                                            <div
                                                key={area.id}
                                                className="overview-cell"
                                                style={{ '--area-color': area.color }}
                                                title={`${day} - ${area.name}`}
                                            >
                                                <div className="overview-cell-header">
                                                    <span className="overview-cell-icon">{area.icon}</span>
                                                    <span className="overview-cell-name">{area.name}</span>
                                                </div>
                                                {areaActivities.length > 0 ? (
                                                    areaActivities.map((item, idx) => (
                                                        <div key={idx} className="overview-activity">
                                                            <span className="overview-time">{item.time}</span>
                                                            {item.activity}
                                                        </div>
                                                    ))
                                                ) : (
                                                    <span style={{ opacity: 0.3, margin: 'auto' }}>Vazio</span>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>
                    )}

                    {showNotification && (
                        <div className="export-notification">
                            ✅ Operação concluída com sucesso!
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
